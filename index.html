<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#F4F2EF" media="(prefers-color-scheme: light)">
<title>float</title>
<link rel="manifest" href="./manifest.json">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1D9E75;--green-light:#E1F5EE;--green-mid:#9FE1CB;--green-dark:#085041;
  --amber:#EF9F27;--amber-light:#FAEEDA;--amber-dark:#854F0B;
  --red:#E24B4A;--red-light:#FCEBEB;--red-dark:#A32D2D;
  --blue-light:#E6F1FB;--blue-dark:#0C447C;
  --bg:#F4F2EF;--surface:#FFFFFF;--surface2:#EEEAE4;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.05);
  --text:#1A1A18;--text2:#6B6860;--text3:#A09D97;
  --radius-sm:12px;--radius-md:14px;--radius-lg:18px;
  --topbar-h:64px;--safe-bottom:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#000000;--surface:#0C0C0C;--surface2:#161616;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.04);
  --text:#F0EDEA;--text2:#8A8780;--text3:#5A5855;
  --green-light:rgba(29,158,117,0.15);--green-dark:#5ECBA1;
  --amber-light:rgba(239,159,39,0.15);--amber-dark:#F0B84A;
  --red-light:rgba(226,75,74,0.15);--red-dark:#E87877;
  --blue-light:rgba(59,130,246,0.15);--blue-dark:#7BB3F4;
}}
html{font-size:18px;-webkit-text-size-adjust:100%;background:var(--bg)}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100svh;overflow:hidden;position:fixed;width:100%;-webkit-font-smoothing:antialiased}
#app{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.topbar{height:var(--topbar-h);background:var(--surface);border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 18px;flex-shrink:0}
.topbar-text{flex:1}.topbar-title{font-size:20px;font-weight:600;letter-spacing:-0.3px}.topbar-sub{font-size:13px;color:var(--text2);margin-top:1px}
.icon-btn{width:44px;height:44px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:24px;-webkit-tap-highlight-color:transparent}
.icon-btn:active{background:var(--surface2)}.icon-btn.disabled{opacity:0.3;pointer-events:none}
.hb{display:flex;flex-direction:column;gap:4px}.hbl{width:20px;height:2px;background:var(--text);border-radius:1px;display:block}
.scroll-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 14px 80px;background:var(--bg);-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.scroll-body::-webkit-scrollbar{display:none}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.metric{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-md);padding:14px 16px}
.metric-label{font-size:13px;color:var(--text2);font-weight:500;margin-bottom:5px}
.metric-value{font-size:26px;font-weight:700;letter-spacing:-0.8px;color:var(--text);line-height:1.1}
.metric-value.green{color:var(--green)}.metric-value.amber{color:var(--amber)}.metric-value.red{color:var(--red)}
.metric-sub{font-size:12px;color:var(--text3);margin-top:3px}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-md);padding:14px;margin-bottom:10px}
.card-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px}
.alert-bar{border-radius:var(--radius-md);padding:12px 14px;font-size:14px;margin-bottom:10px;display:flex;gap:10px;align-items:flex-start;line-height:1.45;font-weight:500}
.alert-bar i{font-size:18px;flex-shrink:0;margin-top:1px}
.alert-bar.warning{background:var(--amber-light);color:var(--amber-dark);border:0.5px solid var(--amber)}
.alert-bar.success{background:var(--green-light);color:var(--green-dark);border:0.5px solid var(--green-mid)}
.pace-chart-wrap{display:flex;flex-direction:column;gap:10px}
.pace-row{display:flex;gap:3px;height:64px;align-items:flex-end}
.pace-day{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end}
.pace-bar-wrap{flex:1;width:100%;display:flex;align-items:flex-end}
.pace-bar{width:100%;border-radius:4px 4px 0 0;min-height:4px;transition:height 0.3s}
.pace-bar.past{background:var(--green-mid)}.pace-bar.today{background:var(--green)}.pace-bar.future{background:var(--surface2);border:1.5px dashed rgba(159,225,203,0.5)}
.pace-label{font-size:10px;color:var(--text3)}.pace-label.today{color:var(--green);font-weight:700}
.pace-legend{display:flex;gap:14px;font-size:11px;color:var(--text3);margin-top:2px}
.legend-dot{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:4px;vertical-align:middle}
.legend-dot.past{background:var(--green-mid)}.legend-dot.today{background:var(--green)}.legend-dot.future{background:var(--surface2);border:1.5px dashed rgba(159,225,203,0.5)}
.budget-row{margin-bottom:14px}.budget-row:last-child{margin-bottom:0}
.budget-row-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.budget-name{font-size:15px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:7px}
.budget-name i{font-size:16px;color:var(--text2)}
.budget-amounts{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px}
.progress-track{height:7px;background:var(--surface2);border-radius:4px;overflow:hidden;margin-bottom:5px}
.progress-track.sm{height:5px;margin-bottom:0}
.progress-fill{height:100%;border-radius:4px}
.progress-fill.ok{background:var(--green)}.progress-fill.caution{background:var(--amber)}.progress-fill.over{background:var(--red)}
.budget-sub{font-size:12px;color:var(--text3)}.budget-sub.red{color:var(--red)}
.pill{font-size:11px;padding:3px 8px;border-radius:7px;font-weight:600;white-space:nowrap}
.pill.ok{background:var(--green-light);color:var(--green-dark)}.pill.caution,.pill.wn{background:var(--amber-light);color:var(--amber-dark)}
.pill.over{background:var(--red-light);color:var(--red-dark)}.pill.fx{background:var(--green-light);color:var(--green-dark)}
.pill.vr{background:var(--blue-light);color:var(--blue-dark)}.pill.info{background:var(--blue-light);color:var(--blue-dark)}
.bills-chips{display:flex;gap:8px;flex-wrap:wrap}
.bill-chip{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 14px}
.bill-chip-label{font-size:12px;color:var(--text2);margin-bottom:3px}.bill-chip-value{font-size:16px;font-weight:700;color:var(--text)}
#drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:40;pointer-events:none;transition:background 0.25s}
#drawer-overlay.visible{background:rgba(0,0,0,0.55);pointer-events:all}
#drawer{position:fixed;top:0;left:0;bottom:0;width:75vw;max-width:300px;background:var(--surface);border-right:0.5px solid var(--border);z-index:50;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);padding:20px 14px calc(20px + var(--safe-bottom));gap:2px}
#drawer.open{transform:translateX(0)}
.dr-logo{font-size:22px;font-weight:700;letter-spacing:-0.5px;padding:4px 12px;margin-bottom:22px}
.dr-logo span{color:var(--green)}
.dr-item{display:flex;align-items:center;gap:12px;padding:14px;border-radius:var(--radius-md);font-size:16px;color:var(--text2);cursor:pointer;-webkit-tap-highlight-color:transparent}
.dr-item:active{background:var(--surface2)}.dr-item.active{background:var(--green-light);color:var(--green-dark);font-weight:600}
.dr-item i{font-size:22px}
.dr-section{font-size:11px;font-weight:600;letter-spacing:0.06em;color:var(--text3);padding:12px 14px 4px;text-transform:uppercase}
.dr-footer{margin-top:auto;padding:12px 14px 0;border-top:0.5px solid var(--border);font-size:12px;color:var(--text3);line-height:1.6}
#fab-container{position:fixed;bottom:calc(24px + var(--safe-bottom));right:20px;z-index:30;display:flex;flex-direction:column;align-items:flex-end;gap:12px}
#fab{width:60px;height:60px;border-radius:50%;background:var(--green);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 4px 20px rgba(29,158,117,0.45);transition:transform 0.2s;-webkit-tap-highlight-color:transparent}
#fab.open{transform:rotate(45deg)}#fab:active{transform:scale(0.93)}
#fab-dial{display:flex;flex-direction:column;align-items:flex-end;gap:10px;opacity:0;pointer-events:none;transform:translateY(10px);transition:opacity 0.2s,transform 0.2s}
#fab-dial.visible{opacity:1;pointer-events:all;transform:translateY(0)}
.fab-option{display:flex;align-items:center;gap:12px;background:var(--surface);border:0.5px solid var(--border);border-radius:28px;padding:14px 20px 14px 16px;cursor:pointer;font-size:16px;font-weight:600;color:var(--text);box-shadow:0 3px 14px rgba(0,0,0,0.18);-webkit-tap-highlight-color:transparent;white-space:nowrap}
.fab-option i{font-size:22px;color:var(--green)}.fab-option:active{background:var(--surface2)}
.bottom-sheet{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-radius:24px 24px 0 0;border-top:0.5px solid var(--border);z-index:60;padding:0 18px calc(24px + var(--safe-bottom));transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);max-height:92svh;overflow-y:auto}
.bottom-sheet.visible{transform:translateY(0)}
.sheet-handle{width:40px;height:5px;background:var(--border);border-radius:3px;margin:12px auto 18px;cursor:pointer}
.sheet-title{font-size:20px;font-weight:700;margin-bottom:18px;letter-spacing:-0.3px}
.sheet-backdrop{position:fixed;inset:0;z-index:55;background:rgba(0,0,0,0);pointer-events:none;transition:background 0.3s}
body.sheet-open .sheet-backdrop{background:rgba(0,0,0,0.55);pointer-events:all}
.field-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:7px;display:block}
.text-input,.num-input,.select-input{width:100%;padding:14px 16px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;margin-bottom:12px;-webkit-appearance:none}
.text-input:focus,.num-input:focus{outline:none;border-color:var(--green);background:var(--surface)}
.amt-box{background:var(--surface2);border-radius:var(--radius-md);padding:16px;text-align:center;margin-bottom:14px}
.amt-display{display:flex;align-items:baseline;justify-content:center;gap:3px}
.amt-cur{font-size:24px;font-weight:500;color:var(--text2)}
.amt-val-input{font-size:48px;font-weight:700;letter-spacing:-1.5px;border:none;background:transparent;color:var(--text);text-align:center;width:200px;font-family:'DM Sans',sans-serif}
.amt-val-input:focus{outline:none}.amt-val-input::placeholder{color:var(--text3)}
.amt-hint{font-size:14px;color:var(--green);margin-top:6px;font-weight:600}.amt-hint.warn{color:var(--red)}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.cat-btn{padding:14px 8px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.cat-btn i{font-size:24px;color:var(--text2);display:block;margin-bottom:5px}.cat-btn span{font-size:12px;color:var(--text2);font-weight:500}
.cat-btn.sel{border:2px solid var(--green);background:var(--green-light)}.cat-btn.sel i{color:var(--green)}.cat-btn.sel span{color:var(--green-dark);font-weight:700}
.time-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.time-input-wrap{background:var(--surface2);border-radius:var(--radius-sm);border:0.5px solid var(--border);padding:14px;text-align:center}
.time-val-input{font-size:36px;font-weight:700;border:none;background:transparent;color:var(--text);text-align:center;width:100%;font-family:'DM Sans',sans-serif}
.time-val-input:focus{outline:none}.time-unit{font-size:12px;color:var(--text2);margin-top:3px;font-weight:500}
.rate-preview{background:var(--green-light);color:var(--green-dark);border-radius:var(--radius-sm);padding:12px 16px;font-size:14px;font-weight:700;text-align:center;margin-bottom:14px}
.note-input{width:100%;padding:14px 16px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;margin-bottom:16px}
.note-input:focus{outline:none;border-color:var(--green);background:var(--surface)}
.save-btn{width:100%;padding:18px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-md);font-family:'DM Sans',sans-serif;font-size:17px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent}
.save-btn:active{opacity:0.85}
.btn-row{display:flex;gap:10px;margin-top:12px}
.btn-cancel{flex:1;padding:16px;border:0.5px solid var(--border);border-radius:var(--radius-md);background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;cursor:pointer}
.btn-confirm-delete,.btn-delete-cat{padding:16px 20px;background:var(--red-light);color:var(--red-dark);border:none;border-radius:var(--radius-md);font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px}
.modal-overlay{position:fixed;inset:0;z-index:70;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity 0.2s}
.modal-overlay.visible{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:360px;overflow:hidden}
.modal-head{padding:18px 20px 16px;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:18px;font-weight:700}
.close-btn{width:34px;height:34px;border-radius:9px;background:var(--surface2);border:none;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text2);cursor:pointer}
.modal-body{padding:18px 20px}.modal-foot{padding:14px 20px;border-top:0.5px solid var(--border);display:flex;gap:10px}
.del-icon{width:52px;height:52px;border-radius:50%;background:var(--red-light);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:24px;color:var(--red)}
.del-title{font-size:18px;font-weight:700;text-align:center;margin-bottom:6px}
.del-tx-name{font-size:16px;font-weight:600;text-align:center;display:block}
.del-tx-meta{font-size:14px;color:var(--text2);text-align:center;display:block;margin-top:4px}
.period-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.period-nav-label{font-size:15px;font-weight:600}
.chips{display:flex;gap:7px;margin-bottom:12px}
.chip{font-size:13px;padding:7px 14px;border-radius:14px;border:0.5px solid var(--border);color:var(--text2);font-weight:500;background:transparent;cursor:pointer;-webkit-tap-highlight-color:transparent}
.chip.on{background:var(--green-light);color:var(--green-dark);border-color:var(--green-mid);font-weight:700}
.swipe-hint{font-size:12px;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:5px}
.day-group{margin-bottom:14px}
.day-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:7px}
.tx-swipe{display:flex;border-radius:var(--radius-sm);background:var(--surface);border:0.5px solid var(--border);margin-bottom:6px;overflow:hidden}
.tx-main{display:flex;align-items:center;gap:12px;padding:13px 14px;flex:1;min-width:0}
.tx-icon{width:40px;height:40px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;color:var(--text2)}
.tx-icon.gig{background:var(--green-light)}.tx-icon.gig i{color:var(--green-dark)}
.tx-info{flex:1;min-width:0}
.tx-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-cat{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-amount{font-size:15px;font-weight:700;flex-shrink:0}
.tx-amount.expense{color:var(--red)}.tx-amount.income{color:var(--green)}
.tx-actions{display:flex;transform:translateX(100%);transition:transform 0.25s;flex-shrink:0}
.tx-swipe.revealed .tx-actions{transform:translateX(0)}
.tx-action{width:60px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;-webkit-tap-highlight-color:transparent}
.tx-action.edit{background:var(--blue-light);color:var(--blue-dark)}.tx-action.delete{background:var(--red-light);color:var(--red-dark)}
.gig-hero{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-md);padding:20px;text-align:center;margin-bottom:10px}
.gig-hero-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px}
.gig-hero-val{font-size:44px;font-weight:700;color:var(--green);letter-spacing:-1.5px;line-height:1}
.gig-hero-sub{font-size:13px;color:var(--text2);margin-top:6px}
.gig-rate-row{display:flex;gap:10px;justify-content:center;margin-top:12px}
.gig-rate-item{font-size:13px;font-weight:700;padding:6px 14px;border-radius:12px}
.gig-rate-item.best{background:var(--green-light);color:var(--green-dark)}.gig-rate-item.worst{background:var(--red-light);color:var(--red-dark)}
.run-right{text-align:right;flex-shrink:0}.run-rate{font-size:12px;color:var(--text2);margin-top:2px}
.hist-toggle{display:flex;background:var(--surface2);border-radius:var(--radius-sm);padding:4px;gap:3px;margin-bottom:12px}
.hist-tab{flex:1;padding:9px;border-radius:10px;font-size:14px;font-weight:500;color:var(--text2);text-align:center;border:none;background:transparent;cursor:pointer}
.hist-tab.on{background:var(--surface);color:var(--text);font-weight:700}
.week-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-md);margin-bottom:10px;overflow:hidden}
.wc-head{padding:14px 16px;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.wc-label{font-size:14px;font-weight:700}.wc-sub{font-size:12px;color:var(--text3);margin-top:2px}
.wc-body{padding:14px 16px}
.wc-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.wc-row:last-child{margin-bottom:0}
.wc-key{font-size:14px;color:var(--text2)}.wc-key.bold{font-weight:700;color:var(--text)}
.wc-val{font-size:14px;font-weight:600}.wc-val.green{color:var(--green)}.wc-val.red{color:var(--red)}.wc-val.bold{font-size:16px}
.wc-divider{height:0.5px;background:var(--border);margin:10px 0}
.wc-sub-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px}
.hist-cat-row{margin-bottom:8px}
.hist-cat-top{display:flex;justify-content:space-between;margin-bottom:4px}
.hist-cat-name{font-size:13px;color:var(--text);display:flex;align-items:center;gap:6px;font-weight:500}
.hist-cat-val{font-size:13px;color:var(--text2)}
.settings-section{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-md);padding:0 16px;margin-bottom:10px}
.settings-section-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;padding:12px 0 0}
.si{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:0.5px solid var(--border2)}
.si:last-child{border-bottom:none}
.si-label{font-size:15px;font-weight:500;color:var(--text)}.si-sub{font-size:12px;color:var(--text2);margin-top:3px}
.si-right{display:flex;align-items:center;gap:8px;font-size:15px;color:var(--text2)}
.si.tappable{cursor:pointer;-webkit-tap-highlight-color:transparent}
.si.tappable:active{background:var(--surface2);margin:0 -16px;padding-left:16px;padding-right:16px}
.si.danger .si-label{color:var(--red)}.si.danger .si-right{color:var(--red)}
.seg{display:flex;background:var(--surface2);border-radius:9px;padding:3px;gap:2px}
.seg-opt{flex:1;padding:7px 10px;border-radius:7px;font-size:13px;font-weight:500;color:var(--text2);text-align:center;border:none;background:transparent;cursor:pointer;white-space:nowrap}
.seg-opt.on{background:var(--surface);color:var(--text);font-weight:700}
.switch{width:50px;height:28px;border-radius:14px;background:var(--surface2);border:0.5px solid var(--border);position:relative;cursor:pointer;flex-shrink:0;transition:background 0.2s,border-color 0.2s}
.switch::after{content:'';width:22px;height:22px;border-radius:50%;background:#fff;position:absolute;top:2px;left:3px;transition:transform 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.25)}
.switch.on{background:var(--green);border-color:var(--green)}.switch.on::after{transform:translateX(22px)}
.si-input,.si-select{padding:9px 12px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;text-align:right;-webkit-appearance:none;max-width:140px}
.si-input:focus,.si-select:focus{outline:none;border-color:var(--green)}
.settings-footer{font-size:12px;color:var(--text3);text-align:center;margin-top:20px}
.settings-help{font-size:13px;color:var(--text2);margin-bottom:10px;line-height:1.5}
.cat-list-item{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:0.5px solid var(--border2);cursor:pointer;-webkit-tap-highlight-color:transparent}
.cat-list-item:last-child{border-bottom:none}
.cat-list-icon{width:40px;height:40px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text2);flex-shrink:0}
.cat-list-info{flex:1}
.cat-list-name{font-size:15px;font-weight:600;color:var(--text)}
.cat-list-budget{font-size:12px;color:var(--text2);margin-top:3px;display:flex;gap:7px;align-items:center}
.add-cat-btn{width:100%;margin-top:10px;padding:16px;border:2px dashed var(--border);border-radius:var(--radius-md);background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.icon-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:14px}
.icon-opt{aspect-ratio:1;border-radius:10px;background:var(--surface2);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text2);cursor:pointer;-webkit-tap-highlight-color:transparent}
.icon-opt.sel{background:var(--green-light);border:2px solid var(--green);color:var(--green)}
.type-toggle{display:flex;gap:8px;margin-bottom:14px}
.tt-btn{flex:1;padding:13px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tt-btn.on{border:2px solid var(--green);background:var(--green-light);color:var(--green-dark);font-weight:700}
.empty-state{font-size:15px;color:var(--text3);padding:28px 0;text-align:center}
.loading{font-size:15px;color:var(--text3);padding:28px 0;text-align:center}
button{-webkit-tap-highlight-color:transparent}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
</style>

<body>
<div id="app">
  <div id="drawer-overlay"></div>
  <nav id="drawer">
    <div class="dr-logo">float<span>.</span></div>
    <a class="dr-item active" data-view="dashboard"><i class="ti ti-layout-dashboard"></i> Dashboard</a>
    <a class="dr-item" data-view="transactions"><i class="ti ti-receipt"></i> Transactions</a>
    <a class="dr-item" data-view="gig"><i class="ti ti-bike"></i> Gig runs</a>
    <a class="dr-item" data-view="history"><i class="ti ti-chart-bar"></i> History</a>
    <div class="dr-section">Account</div>
    <a class="dr-item" data-view="settings"><i class="ti ti-settings"></i> Settings</a>
    <div class="dr-footer">float v1.0<br>Offline PWA · Data stored on-device</div>
  </nav>
  <main id="main"></main>
  <div id="fab-container">
    <div id="fab-dial">
      <button class="fab-option" id="fab-gig"><i class="ti ti-bike"></i> Log gig run</button>
      <button class="fab-option" id="fab-expense"><i class="ti ti-shopping-bag"></i> Log expense</button>
    </div>
    <button id="fab"><i class="ti ti-plus"></i></button>
  </div>
</div>

<!-- Expense sheet -->
<div id="expense-sheet" class="bottom-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Log expense</div>
  <label class="field-label">Category</label>
  <div class="cat-grid" id="expense-cat-grid"></div>
  <div class="amt-box">
    <div class="amt-display"><span class="amt-cur">$</span><input class="amt-val-input" id="expense-amt" type="number" inputmode="decimal" min="0" step="0.01" placeholder="0.00"></div>
    <div class="amt-hint" id="expense-hint">Select a category</div>
  </div>
  <label class="field-label">Note</label>
  <input class="note-input" id="expense-note" type="text" placeholder="e.g. Woolies run" autocomplete="off">
  <button class="save-btn" id="expense-save"><i class="ti ti-check"></i> Save expense</button>
</div>

<!-- Gig sheet -->
<div id="gig-sheet" class="bottom-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Log gig run</div>
  <label class="field-label">Amount earned</label>
  <div class="amt-box" style="margin-bottom:10px">
    <div class="amt-display"><span class="amt-cur">$</span><input class="amt-val-input" id="gig-amt" type="number" inputmode="decimal" min="0" step="0.01" placeholder="0.00"></div>
  </div>
  <label class="field-label">Time clocked in</label>
  <div class="time-grid">
    <div class="time-input-wrap"><input class="time-val-input" id="gig-hr" type="number" inputmode="numeric" min="0" max="23" placeholder="0"><div class="time-unit">hours</div></div>
    <div class="time-input-wrap"><input class="time-val-input" id="gig-min" type="number" inputmode="numeric" min="0" max="59" placeholder="0"><div class="time-unit">minutes</div></div>
  </div>
  <div class="rate-preview" id="gig-rate" style="display:none"></div>
  <label class="field-label">Note <span style="font-weight:400;color:var(--text3)">(optional)</span></label>
  <input class="note-input" id="gig-note" type="text" placeholder="e.g. Saturday night Uber Eats" autocomplete="off">
  <button class="save-btn" id="gig-save"><i class="ti ti-check"></i> Save gig run</button>
</div>

<!-- Delete modal -->
<div id="delete-modal" class="modal-overlay">
  <div class="modal">
    <div class="modal-body" style="text-align:center;padding:22px 18px 16px">
      <div class="del-icon"><i class="ti ti-trash"></i></div>
      <div class="del-title">Delete this?</div>
      <span class="del-tx-name" id="del-name"></span>
      <span class="del-tx-meta" id="del-meta"></span>
      <div class="btn-row" style="margin-top:16px">
        <button class="btn-cancel" id="del-cancel">Cancel</button>
        <button class="btn-confirm-delete" id="del-confirm"><i class="ti ti-trash"></i> Delete</button>
      </div>
    </div>
  </div>
</div>

<!-- Category modal -->
<div id="cat-modal" class="modal-overlay">
  <div class="modal" style="max-height:80svh;overflow-y:auto">
    <div class="modal-head">
      <span class="modal-title" id="cat-modal-title">Edit category</span>
      <button class="close-btn" id="cat-modal-close"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <label class="field-label">Name</label>
      <input class="text-input" id="cat-name" type="text" placeholder="Category name" autocomplete="off" style="margin-bottom:10px">
      <label class="field-label">Budget per period</label>
      <div style="position:relative;margin-bottom:10px">
        <span style="position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:15px;pointer-events:none">$</span>
        <input class="num-input" id="cat-budget" type="number" inputmode="decimal" min="0" step="0.01" placeholder="0.00" style="padding-left:28px;margin-bottom:0">
      </div>
      <label class="field-label">Type</label>
      <div class="type-toggle">
        <button class="tt-btn on" data-type="variable">Variable</button>
        <button class="tt-btn" data-type="fixed">Fixed bill</button>
      </div>
      <label class="field-label">Icon</label>
      <div class="icon-grid" id="cat-icon-grid"></div>
    </div>
    <div class="modal-foot" style="justify-content:space-between">
      <button class="btn-delete-cat" id="cat-delete" style="display:none"><i class="ti ti-trash"></i> Delete</button>
      <div style="display:flex;gap:8px;margin-left:auto">
        <button class="btn-cancel" id="cat-cancel">Cancel</button>
        <button class="save-btn" id="cat-save" style="width:auto;padding:12px 20px">Save</button>
      </div>
    </div>
  </div>
</div>

<div class="sheet-backdrop" id="sheet-backdrop"></div>

<script>
// ── DB ──────────────────────────────────────────────────────────────────────
const DB_NAME='float',DB_V=1;let _db=null;
function openDB(){if(_db)return Promise.resolve(_db);return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_V);r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains('settings'))db.createObjectStore('settings',{keyPath:'key'});if(!db.objectStoreNames.contains('categories')){const s=db.createObjectStore('categories',{keyPath:'id'});s.createIndex('order','order',{unique:false})}if(!db.objectStoreNames.contains('transactions')){const s=db.createObjectStore('transactions',{keyPath:'id'});s.createIndex('periodKey','periodKey',{unique:false});s.createIndex('type','type',{unique:false})}};r.onsuccess=e=>{_db=e.target.result;res(_db)};r.onerror=()=>rej(r.error)})}
function rq(r){return new Promise((res,rej)=>{r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
function txS(s,m='readonly'){return openDB().then(db=>db.transaction(s,m).objectStore(s))}
const DB={
  async get(s,k){return rq((await txS(s)).get(k))},
  async getAll(s){return rq((await txS(s)).getAll())},
  async getByIndex(s,i,v){return rq((await txS(s)).index(i).getAll(v))},
  async put(s,r){return rq((await txS(s,'readwrite')).put(r))},
  async del(s,k){return rq((await txS(s,'readwrite')).delete(k))},
  async uniqueKeys(s,i){const st=await txS(s);return new Promise((res,rej)=>{const v=new Set();const c=st.index(i).openKeyCursor(null,'nextunique');c.onsuccess=e=>{const cur=e.target.result;if(cur){v.add(cur.key);cur.continue()}else res([...v])};c.onerror=()=>rej(c.error)})}
};

// ── PERIODS ──────────────────────────────────────────────────────────────────
const ANCHOR='2025-01-07';
const pD=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)};
const fD=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const today=()=>fD(new Date());
const addDays=(s,n)=>{const d=pD(s);d.setDate(d.getDate()+n);return fD(d)};
const diffDays=(a,b)=>Math.round((pD(b)-pD(a))/86400000);
function getPeriodStart(ds,cfg){const{payCycle='fortnightly',payDay=2}=cfg;const d=pD(ds);const back=(d.getDay()-payDay+7)%7;const cand=fD(new Date(d.getFullYear(),d.getMonth(),d.getDate()-back));if(payCycle==='weekly')return cand;const wn=Math.round(diffDays(ANCHOR,cand)/7);return wn%2===0?cand:addDays(cand,-7)}
const getPeriodEnd=(s,c)=>addDays(s,c.payCycle==='fortnightly'?13:6);
const getPeriodLen=c=>c.payCycle==='fortnightly'?14:7;
function getPeriodProgress(c){const t=today();const s=getPeriodStart(t,c);return Math.min((diffDays(s,t)+1)/getPeriodLen(c),1)}
function getPeriodLabel(s,c){const e=getPeriodEnd(s,c);const ds=pD(s);const de=pD(e);const sm=ds.getMonth()===de.getMonth();return`${ds.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'})} – ${de.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:sm?undefined:'short'})}`}
const curPeriodKey=c=>getPeriodStart(today(),c);
const prevPK=(k,c)=>addDays(k,-getPeriodLen(c));
const nextPK=(k,c)=>addDays(k,getPeriodLen(c));
function getPeriodDays(s,c){const t=today();return Array.from({length:getPeriodLen(c)},(_,i)=>{const ds=addDays(s,i);const d=pD(ds);return{date:ds,label:d.toLocaleDateString('en-AU',{weekday:'narrow'}),isPast:ds<t,isToday:ds===t,isFuture:ds>t}})}
function getPeriodMonth(s,c){const m=addDays(s,Math.floor(getPeriodLen(c)/2));const d=pD(m);return{year:d.getFullYear(),month:d.getMonth()+1}}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
const SDEFS={income:0,payCycle:'fortnightly',payDay:2,rollover:false,alertPace:true,alertOver:true,alertSummary:false,seeded:false};
const DCATS=[{id:'cat_rent',name:'Rent',type:'fixed',budget:0,icon:'ti-home',order:0},{id:'cat_wifi',name:'Wifi',type:'fixed',budget:0,icon:'ti-wifi',order:1},{id:'cat_phone',name:'Phone plan',type:'fixed',budget:0,icon:'ti-device-mobile',order:2},{id:'cat_groc',name:'Groceries',type:'variable',budget:0,icon:'ti-shopping-cart',order:3},{id:'cat_eat',name:'Eating out',type:'variable',budget:0,icon:'ti-coffee',order:4},{id:'cat_trans',name:'Transport',type:'variable',budget:0,icon:'ti-car',order:5}];
const getSetting=async k=>{const r=await DB.get('settings',k);return r?r.value:SDEFS[k]};
const setSetting=(k,v)=>DB.put('settings',{key:k,value:v});
async function getAllSettings(){const rows=await DB.getAll('settings');const o={...SDEFS};for(const r of rows)o[r.key]=r.value;return o}
async function seedIfNeeded(){if(await getSetting('seeded'))return;for(const[k,v]of Object.entries(SDEFS))await DB.put('settings',{key:k,value:v});for(const c of DCATS)await DB.put('categories',{...c,createdAt:Date.now()});await setSetting('seeded',true)}
const getCategories=async()=>{const c=await DB.getAll('categories');return c.sort((a,b)=>a.order-b.order)};
const saveCategory=c=>DB.put('categories',{...c,updatedAt:Date.now()});
const deleteCategory=id=>DB.del('categories',id);
const genId=p=>`${p}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,7)}`;

// ── TRANSACTIONS ──────────────────────────────────────────────────────────────
const fmtPos=n=>'$'+Math.abs(n).toFixed(2);
const fmtAUD=n=>(n<0?'-$':'$')+Math.abs(n).toFixed(2);
function fmtDur(m){if(!m)return'0m';const h=Math.floor(m/60),mn=m%60;return h&&mn?`${h}h ${mn}m`:h?`${h}h`:`${mn}m`}
async function addExpense(d,cfg){const date=d.date||today();const tx={id:genId('tx'),type:'expense',categoryId:d.categoryId,amount:Math.round(d.amount*100)/100,note:d.note||'',date,periodKey:getPeriodStart(date,cfg),createdAt:Date.now()};await DB.put('transactions',tx);return tx}
async function addGigRun(d,cfg){const date=d.date||today();const tm=(d.hours||0)*60+(d.minutes||0);const hr=tm>0?Math.round((d.amount/(tm/60))*100)/100:0;const tx={id:genId('gig'),type:'gig',categoryId:null,amount:Math.round(d.amount*100)/100,hours:d.hours||0,minutes:d.minutes||0,totalMinutes:tm,hourlyRate:hr,note:d.note||'',date,periodKey:getPeriodStart(date,cfg),createdAt:Date.now()};await DB.put('transactions',tx);return tx}
async function updateTx(id,ch,cfg){const ex=await DB.get('transactions',id);if(!ex)return;const up={...ex,...ch,updatedAt:Date.now()};if(ch.date&&ch.date!==ex.date)up.periodKey=getPeriodStart(ch.date,cfg);if(up.type==='gig'){const tm=(up.hours||0)*60+(up.minutes||0);up.totalMinutes=tm;up.hourlyRate=tm>0?Math.round((up.amount/(tm/60))*100)/100:0}await DB.put('transactions',up);return up}
const deleteTx=id=>DB.del('transactions',id);
async function getTxForPeriod(pk){const a=await DB.getByIndex('transactions','periodKey',pk);return a.sort((a,b)=>b.date!==a.date?b.date.localeCompare(a.date):b.createdAt-a.createdAt)}
async function getTxGrouped(pk){const txs=await getTxForPeriod(pk);const g={};for(const t of txs){if(!g[t.date])g[t.date]=[];g[t.date].push(t)}return g}
const getAllPK=()=>DB.uniqueKeys('transactions','periodKey');

// ── BUDGET ────────────────────────────────────────────────────────────────────
function gigStats(runs){if(!runs.length)return{totalEarned:0,totalMinutes:0,runCount:0,avgHourlyRate:0,bestRate:0,worstRate:0};const te=runs.reduce((s,g)=>s+g.amount,0);const tm=runs.reduce((s,g)=>s+(g.totalMinutes||0),0);const avg=tm>0?Math.round((te/(tm/60))*100)/100:0;const rates=runs.filter(g=>g.hourlyRate>0).map(g=>g.hourlyRate);return{totalEarned:te,totalMinutes:tm,runCount:runs.length,avgHourlyRate:avg,bestRate:rates.length?Math.max(...rates):0,worstRate:rates.length?Math.min(...rates):0}}
async function computeStats(pk,cfg,cats){const txs=await getTxForPeriod(pk);const expenses=txs.filter(t=>t.type==='expense');const gigs=txs.filter(t=>t.type==='gig');const base=cfg.income||0;const gigInc=gigs.reduce((s,g)=>s+g.amount,0);const total=base+gigInc;const fxCats=cats.filter(c=>c.type==='fixed');const varCats=cats.filter(c=>c.type==='variable');const fxTotal=fxCats.reduce((s,c)=>s+c.budget,0);const byCat={};for(const t of expenses)byCat[t.categoryId]=(byCat[t.categoryId]||0)+t.amount;const varSpent=Object.values(byCat).reduce((s,v)=>s+v,0);const spent=fxTotal+varSpent;const rem=total-spent;const prog=getPeriodProgress(cfg);const byCatOut={};for(const c of[...fxCats,...varCats]){const s=byCat[c.id]||0;const pct=c.budget>0?s/c.budget:0;const br=prog>0?pct/prog:0;byCatOut[c.id]={budget:c.budget,spent:s,remaining:c.budget-s,pct,burnRate:br,status:pct>=1?'over':br>1.3?'caution':'ok'}}return{baseIncome:base,gigIncome:gigInc,totalIncome:total,fixedTotal:fxTotal,variableSpent:varSpent,totalSpent:spent,remaining:rem,periodProgress:prog,byCategory:byCatOut,transactions:txs,expenses,gigRuns:gigs,gigStats:gigStats(gigs),categories:cats,fixedCats:fxCats,variableCats:varCats}}
async function getDailyPace(pk,cfg){const txs=await getTxForPeriod(pk);const days=getPeriodDays(pk,cfg);const spd={};for(const t of txs)if(t.type==='expense')spd[t.date]=(spd[t.date]||0)+t.amount;const past=days.filter(d=>d.isPast||d.isToday);const avg=past.length?past.reduce((s,d)=>s+(spd[d.date]||0),0)/past.length:0;const max=Math.max(avg*1.5,...Object.values(spd),1);return days.map(d=>({...d,spent:spd[d.date]||0,heightPct:Math.min(((spd[d.date]||(d.isFuture?avg:0))/max)*100,100)}))}

// ── ALERTS ────────────────────────────────────────────────────────────────────
function getAlerts(stats,cfg){if(!cfg.alertPace&&!cfg.alertOver)return[];const out=[];const{byCategory:bc,variableCats:vc,remaining:rem,totalIncome:ti,periodProgress:pp}=stats;if(rem<0)out.push({type:'warning',icon:'ti-alert-triangle',msg:`You're ${fmtPos(Math.abs(rem))} over total budget.`,p:0});else if(rem<ti*0.1&&ti>0)out.push({type:'warning',icon:'ti-alert-triangle',msg:`Only ${fmtPos(rem)} remaining this period.`,p:1});if(cfg.alertOver)for(const c of vc){const cs=bc[c.id];if(cs?.pct>=1)out.push({type:'warning',icon:'ti-alert-triangle',msg:`${c.name} over budget by ${fmtPos(cs.spent-cs.budget)}.`,p:2})}if(cfg.alertPace)for(const c of vc){const cs=bc[c.id];if(cs&&cs.pct<1&&cs.burnRate>1.35&&cs.pct>0.25)out.push({type:'warning',icon:'ti-flame',msg:`${c.name} at ${Math.round(cs.pct*100)}% — only ${Math.round(pp*100)}% through period.`,p:3})}if(!out.length&&pp>0.65&&rem>ti*0.2)out.push({type:'success',icon:'ti-circle-check',msg:`Looking good — ${fmtPos(rem)} left with ${Math.round((1-pp)*100)}% remaining.`,p:99});return out.sort((a,b)=>a.p-b.p).slice(0,2)}

// ── HISTORY ───────────────────────────────────────────────────────────────────
async function getAllPeriods(cfg,cats){const keys=await getAllPK();const cur=curPeriodKey(cfg);if(!keys.includes(cur))keys.push(cur);const periods=await Promise.all(keys.map(async k=>{const s=await computeStats(k,cfg,cats);return{periodKey:k,label:getPeriodLabel(k,cfg),isCurrent:k===cur,...s}}));return periods.sort((a,b)=>b.periodKey.localeCompare(a.periodKey))}
async function getMonthlyStats(cfg,cats){const all=await getAllPeriods(cfg,cats);const mm={};for(const p of all){const{year,month}=getPeriodMonth(p.periodKey,cfg);const key=`${year}-${String(month).padStart(2,'0')}`;if(!mm[key]){const d=pD(`${key}-01`);mm[key]={year,month,key,label:d.toLocaleDateString('en-AU',{month:'long',year:'numeric'}),periods:[],totalBaseIncome:0,totalGigIncome:0,totalIncome:0,totalFixed:0,totalVariable:0,totalSpent:0,remaining:0,gigRunCount:0,gigTotalMinutes:0,spentByCat:{}}}const m=mm[key];m.periods.push(p);m.totalBaseIncome+=p.baseIncome;m.totalGigIncome+=p.gigIncome;m.totalIncome+=p.totalIncome;m.totalFixed+=p.fixedTotal;m.totalVariable+=p.variableSpent;m.totalSpent+=p.totalSpent;m.remaining+=p.remaining;m.gigRunCount+=p.gigStats.runCount;m.gigTotalMinutes+=p.gigStats.totalMinutes;for(const[id,cs]of Object.entries(p.byCategory))m.spentByCat[id]=(m.spentByCat[id]||0)+cs.spent}return Object.values(mm).sort((a,b)=>b.key.localeCompare(a.key))}

// ── STATE ─────────────────────────────────────────────────────────────────────
let APP={settings:{},categories:[],lastStats:null};
const getState=()=>APP;
const setState=s=>{APP=s};

// ── DRAWER ────────────────────────────────────────────────────────────────────
let drawerOpen=false,tsx=0,tsy=0;
const openDrawer=()=>{document.getElementById('drawer').classList.add('open');document.getElementById('drawer-overlay').classList.add('visible');drawerOpen=true};
const closeDrawer=()=>{document.getElementById('drawer').classList.remove('open');document.getElementById('drawer-overlay').classList.remove('visible');drawerOpen=false};
const toggleDrawer=()=>drawerOpen?closeDrawer():openDrawer();
function initDrawer(){
  document.getElementById('drawer-overlay').addEventListener('click',closeDrawer);
  document.querySelectorAll('.dr-item[data-view]').forEach(el=>el.addEventListener('click',()=>navigate(el.dataset.view)));
  document.addEventListener('touchstart',e=>{tsx=e.changedTouches[0].clientX;tsy=e.changedTouches[0].clientY},{passive:true});
  document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tsx,dy=e.changedTouches[0].clientY-tsy;if(Math.abs(dy)>Math.abs(dx)*1.5)return;if(!drawerOpen&&dx>70&&tsx<35)openDrawer();else if(drawerOpen&&dx<-60)closeDrawer()},{passive:true});
}
function initSwipe(){let act=null;document.querySelectorAll('.tx-swipe').forEach(el=>{let sx=0,on=false;el.addEventListener('touchstart',e=>{sx=e.changedTouches[0].clientX;on=true},{passive:true});el.addEventListener('touchend',e=>{if(!on)return;on=false;const dx=e.changedTouches[0].clientX-sx;if(dx<-55){if(act&&act!==el)act.classList.remove('revealed');el.classList.add('revealed');act=el}else if(dx>30){el.classList.remove('revealed');if(act===el)act=null}},{passive:true})});document.addEventListener('touchstart',e=>{if(act&&!act.contains(e.target)){act.classList.remove('revealed');act=null}},{passive:true})}

// ── ROUTER ────────────────────────────────────────────────────────────────────
let curView='dashboard';
function navigate(v,p={}){curView=v;renderView(v,p);closeDrawer();document.querySelectorAll('.dr-item').forEach(el=>el.classList.toggle('active',el.dataset.view===v))}
const rerender=()=>renderView(curView,{});
function renderView(v,p){const m=document.getElementById('main');if(!m)return;({dashboard:renderDashboard,transactions:renderTransactions,gig:renderGig,history:renderHistory,settings:renderSettings,categories:renderCategories}[v]||function(){})(m,p,APP)}

// ── MODALS ────────────────────────────────────────────────────────────────────
const showSheet=id=>{document.getElementById(id).classList.add('visible');document.body.classList.add('sheet-open')};
const hideSheet=id=>{document.getElementById(id).classList.remove('visible');document.body.classList.remove('sheet-open')};
let _expId=null,_gigId=null;

async function showExpenseSheet(ex=null){
  const state=getState();const cats=state.categories.filter(c=>c.type==='variable');
  _expId=ex?.id||null;
  document.querySelector('#expense-sheet .sheet-title').textContent=ex?'Edit expense':'Log expense';
  const grid=document.getElementById('expense-cat-grid');
  grid.innerHTML=cats.map(c=>{const rem=state.lastStats?.byCategory?.[c.id]?.remaining??c.budget;return`<button class="cat-btn${ex?.categoryId===c.id?' sel':''}" data-id="${c.id}" data-rem="${rem}"><i class="ti ${c.icon}"></i><span>${c.name}</span></button>`}).join('');
  const amt=document.getElementById('expense-amt'),hint=document.getElementById('expense-hint'),note=document.getElementById('expense-note');
  amt.value=ex?ex.amount.toFixed(2):'';note.value=ex?.note||'';
  let selId=ex?.categoryId||cats[0]?.id||null;
  grid.querySelector(`[data-id="${selId}"]`)?.classList.add('sel');
  const upHint=()=>{const btn=grid.querySelector(`[data-id="${selId}"]`);if(!btn)return;const rem=parseFloat(btn.dataset.rem),a=parseFloat(amt.value)||0,af=rem-a;hint.textContent=af>=0?`${fmtPos(rem)} remaining in ${btn.querySelector('span').textContent}`:`${fmtPos(Math.abs(af))} over ${btn.querySelector('span').textContent} budget`;hint.className='amt-hint'+(af<0?' warn':'')};
  upHint();
  grid.onclick=e=>{const b=e.target.closest('.cat-btn');if(!b)return;grid.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');selId=b.dataset.id;upHint()};
  amt.oninput=upHint;
  document.getElementById('expense-save').onclick=async()=>{const a=parseFloat(amt.value);if(!a||a<=0||!selId)return;if(_expId)await updateTx(_expId,{categoryId:selId,amount:a,note:note.value},state.settings);else await addExpense({categoryId:selId,amount:a,note:note.value},state.settings);hideSheet('expense-sheet');await rerender()};
  document.querySelector('#expense-sheet .sheet-handle').onclick=()=>hideSheet('expense-sheet');
  showSheet('expense-sheet');
}

async function showGigSheet(ex=null){
  _gigId=ex?.id||null;
  document.querySelector('#gig-sheet .sheet-title').textContent=ex?'Edit gig run':'Log gig run';
  const amt=document.getElementById('gig-amt'),hr=document.getElementById('gig-hr'),mn=document.getElementById('gig-min'),note=document.getElementById('gig-note'),rate=document.getElementById('gig-rate');
  amt.value=ex?ex.amount.toFixed(2):'';hr.value=ex?.hours??0;mn.value=ex?.minutes??0;note.value=ex?.note||'';
  const upRate=()=>{const a=parseFloat(amt.value)||0,h=(parseInt(hr.value)||0)+(parseInt(mn.value)||0)/60;rate.style.display=a>0&&h>0?'block':'none';if(a>0&&h>0)rate.textContent=`Est. ${fmtPos(a/h)}/hr for this run`};
  [amt,hr,mn].forEach(i=>i.oninput=upRate);upRate();
  document.getElementById('gig-save').onclick=async()=>{const a=parseFloat(amt.value);if(!a||a<=0)return;const state=getState();if(_gigId)await updateTx(_gigId,{amount:a,hours:parseInt(hr.value)||0,minutes:parseInt(mn.value)||0,note:note.value},state.settings);else await addGigRun({amount:a,hours:parseInt(hr.value)||0,minutes:parseInt(mn.value)||0,note:note.value},state.settings);hideSheet('gig-sheet');await rerender()};
  document.querySelector('#gig-sheet .sheet-handle').onclick=()=>hideSheet('gig-sheet');
  showSheet('gig-sheet');
}

function showDeleteConfirm(tx,catName){
  document.getElementById('del-name').textContent=tx.note||(tx.type==='gig'?'Gig run':catName||'Transaction');
  document.getElementById('del-meta').textContent=tx.type==='gig'?`Gig run · ${fmtPos(tx.amount)}`:`${catName} · ${fmtPos(tx.amount)}`;
  document.getElementById('del-confirm').onclick=async()=>{await deleteTx(tx.id);document.getElementById('delete-modal').classList.remove('visible');await rerender()};
  document.getElementById('del-cancel').onclick=()=>document.getElementById('delete-modal').classList.remove('visible');
  document.getElementById('delete-modal').classList.add('visible');
}

// ── FAB ───────────────────────────────────────────────────────────────────────
function initFAB(){
  const fab=document.getElementById('fab'),dial=document.getElementById('fab-dial');
  fab.addEventListener('click',()=>{const o=dial.classList.toggle('visible');fab.classList.toggle('open',o)});
  document.getElementById('fab-expense').addEventListener('click',()=>{dial.classList.remove('visible');fab.classList.remove('open');showExpenseSheet()});
  document.getElementById('fab-gig').addEventListener('click',()=>{dial.classList.remove('visible');fab.classList.remove('open');showGigSheet()});
  document.addEventListener('touchstart',e=>{if(!fab.contains(e.target)&&!dial.contains(e.target)){dial.classList.remove('visible');fab.classList.remove('open')}},{passive:true});
}

async function renderDashboard(el,p,state){
  const{settings:cfg,categories:cats}=state;
  const pk=curPeriodKey(cfg);
  const stats=await computeStats(pk,cfg,cats);
  setState({...state,lastStats:stats});
  const pace=await getDailyPace(pk,cfg);
  const alerts=getAlerts({...stats,settings:cfg},cfg);
  const lbl=getPeriodLabel(pk,cfg);
  const rc=stats.remaining<0?'red':stats.remaining<stats.totalIncome*0.1?'amber':'green';
  const isFN=cfg.payCycle==='fortnightly';
  const pRow=days=>`<div class="pace-row">${days.map(d=>`<div class="pace-day"><div class="pace-bar-wrap"><div class="pace-bar ${d.isToday?'today':d.isPast?'past':'future'}" style="height:${Math.max(d.heightPct,2)}%"></div></div><div class="pace-label${d.isToday?' today':''}">${d.label}</div></div>`).join('')}</div>`;
  const chart=isFN?`<div class="pace-chart-wrap">${pRow(pace.slice(0,7))}${pRow(pace.slice(7,14))}</div>`:`<div class="pace-chart-wrap">${pRow(pace)}</div>`;
  el.innerHTML=`<div class="topbar"><button class="icon-btn" id="dt"><span class="hb"><span class="hbl"></span><span class="hbl"></span><span class="hbl"></span></span></button><div class="topbar-text"><div class="topbar-title">float</div><div class="topbar-sub">${lbl}</div></div></div>
<div class="scroll-body">
<div class="metric-grid"><div class="metric"><div class="metric-label">Remaining</div><div class="metric-value ${rc}">${fmtAUD(stats.remaining)}</div><div class="metric-sub">of ${fmtPos(stats.totalIncome)}</div></div><div class="metric"><div class="metric-label">Gig earned</div><div class="metric-value green">${stats.gigIncome>0?'+':''}${fmtPos(stats.gigIncome)}</div><div class="metric-sub">${stats.gigStats.runCount} run${stats.gigStats.runCount!==1?'s':''}</div></div><div class="metric"><div class="metric-label">Spent</div><div class="metric-value amber">${fmtPos(stats.totalSpent)}</div><div class="metric-sub">bills + variable</div></div><div class="metric"><div class="metric-label">Period</div><div class="metric-value">${Math.round(stats.periodProgress*100)}%</div><div class="metric-sub">done</div></div></div>
${alerts.map(a=>`<div class="alert-bar ${a.type}"><i class="ti ${a.icon}"></i><span>${a.msg}</span></div>`).join('')}
<div class="card"><div class="card-title">Spending pace</div>${chart}<div class="pace-legend" style="margin-top:8px"><span><span class="legend-dot past"></span>Actual</span><span><span class="legend-dot future"></span>Projected</span><span><span class="legend-dot today"></span>Today</span></div></div>
${stats.variableCats.length?`<div class="card"><div class="card-title">Variable budgets</div>${stats.variableCats.map(c=>{const cs=stats.byCategory[c.id]||{};const pct=Math.min((cs.pct||0)*100,100);const st=cs.status||'ok';return`<div class="budget-row"><div class="budget-row-top"><span class="budget-name"><i class="ti ${c.icon}"></i> ${c.name}</span><span class="budget-amounts">${fmtPos(cs.spent||0)} / ${fmtPos(c.budget)}${st!=='ok'?` <span class="pill ${st}">${st==='over'?'over':'fast'}</span>`:''}</span></div><div class="progress-track"><div class="progress-fill ${st}" style="width:${pct}%"></div></div><div class="budget-sub${st==='over'?' red':''}">${cs.remaining>=0?fmtPos(cs.remaining)+' remaining':fmtPos(Math.abs(cs.remaining))+' over budget'}</div></div>`}).join('')}</div>`:''}
${stats.fixedCats.length?`<div class="card"><div class="card-title">Fixed bills this period</div><div class="bills-chips">${stats.fixedCats.map(c=>`<div class="bill-chip"><div class="bill-chip-label">${c.name}</div><div class="bill-chip-value">${fmtPos(c.budget)}</div></div>`).join('')}</div></div>`:''}
<div style="height:20px"></div></div>`;

}

let _txPK=null;
async function renderTransactions(el,p,state){
  const{settings:cfg,categories:cats}=state;const cm={};cats.forEach(c=>cm[c.id]=c);
  if(!_txPK)_txPK=curPeriodKey(cfg);
  const groups=await getTxGrouped(_txPK);const dates=Object.keys(groups).sort((a,b)=>b.localeCompare(a));const isCur=_txPK===curPeriodKey(cfg);const filter=p?.filter||'all';
  el.innerHTML=`<div class="topbar"><button class="icon-btn" id="dt"><span class="hb"><span class="hbl"></span><span class="hbl"></span><span class="hbl"></span></span></button><div class="topbar-text"><div class="topbar-title">Transactions</div></div></div>
<div class="scroll-body" style="padding-bottom:16px">
<div class="period-nav"><button class="icon-btn" id="tp"><i class="ti ti-chevron-left"></i></button><span class="period-nav-label">${getPeriodLabel(_txPK,cfg)}</span><button class="icon-btn${isCur?' disabled':''}" id="tn"${isCur?' disabled':''}><i class="ti ti-chevron-right"></i></button></div>
<div class="chips"><button class="chip${filter==='all'?' on':''}" data-f="all">All</button><button class="chip${filter==='expense'?' on':''}" data-f="expense">Expenses</button><button class="chip${filter==='gig'?' on':''}" data-f="gig">Gig runs</button></div>
<div class="swipe-hint"><i class="ti ti-arrow-left"></i> Swipe left to edit or delete</div>
${dates.length===0?'<div class="empty-state">No transactions this period.</div>':''}
${dates.map(dt=>{const txs=groups[dt].filter(t=>filter==='all'||t.type===filter);if(!txs.length)return'';const d=new Date(dt+'T00:00:00');return`<div class="day-group"><div class="day-label">${d.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'})}</div>${txs.map(tx=>{const c=cm[tx.categoryId];const ic=tx.type==='gig'?'ti-bike':c?.icon||'ti-tag';const nm=tx.note||(tx.type==='gig'?'Gig run':c?.name||'');const sb=tx.type==='gig'?`Gig run · ${fmtDur(tx.totalMinutes)} · ${fmtPos(tx.hourlyRate)}/hr`:c?.name||'';return`<div class="tx-swipe"><div class="tx-main"><div class="tx-icon${tx.type==='gig'?' gig':''}"><i class="ti ${ic}"></i></div><div class="tx-info"><div class="tx-name">${nm}</div><div class="tx-cat">${sb}</div></div><div class="tx-amount ${tx.type==='gig'?'income':'expense'}">${tx.type==='gig'?'+':'-'}${fmtPos(tx.amount)}</div></div><div class="tx-actions"><button class="tx-action edit" data-id="${tx.id}"><i class="ti ti-edit"></i></button><button class="tx-action delete" data-id="${tx.id}"><i class="ti ti-trash"></i></button></div></div>`}).join('')}</div>`}).join('')}

let _histTab='periods';
async function renderHistory(el,p,state){
  const{settings:cfg,categories:cats}=state;
  el.innerHTML=`<div class="topbar"><button class="icon-btn" id="dt"><span class="hb"><span class="hbl"></span><span class="hbl"></span><span class="hbl"></span></span></button><div class="topbar-text"><div class="topbar-title">History</div></div></div>
<div class="scroll-body" style="padding-bottom:16px"><div class="hist-toggle"><button class="hist-tab${_histTab==='periods'?' on':''}" data-t="periods">By period</button><button class="hist-tab${_histTab==='monthly'?' on':''}" data-t="monthly">By month</button></div><div id="hc"><div class="loading">Loading…</div></div></div>`;
  document.getElementById('dt').addEventListener('click',toggleDrawer);
  el.querySelectorAll('.hist-tab').forEach(b=>b.addEventListener('click',()=>{_histTab=b.dataset.t;renderHistory(el,p,state)}));
  const hc=el.querySelector('#hc');
  if(_histTab==='periods'){
    const periods=await getAllPeriods(cfg,cats);
    hc.innerHTML=periods.map(p=>{const badge=p.isCurrent?`<span class="pill info">${Math.round(p.periodProgress*100)}% done</span>`:p.remaining>=0?`<span class="pill ok">Saved ${fmtPos(p.remaining)}</span>`:`<span class="pill over">Over by ${fmtPos(Math.abs(p.remaining))}</span>`;return`<div class="week-card"><div class="wc-head"><div><div class="wc-label">${p.label}</div><div class="wc-sub">${p.isCurrent?'In progress':'Completed'}</div></div>${badge}</div><div class="wc-body"><div class="wc-row"><span class="wc-key">Base income</span><span class="wc-val">${fmtPos(p.baseIncome)}</span></div><div class="wc-row"><span class="wc-key">Gig income</span><span class="wc-val green">+${fmtPos(p.gigIncome)}</span></div><div class="wc-row"><span class="wc-key">Fixed bills</span><span class="wc-val">-${fmtPos(p.fixedTotal)}</span></div><div class="wc-row"><span class="wc-key">Variable spent</span><span class="wc-val">-${fmtPos(p.variableSpent)}</span></div><div class="wc-divider"></div><div class="wc-row"><span class="wc-key bold">Remaining</span><span class="wc-val bold ${p.remaining>=0?'green':'red'}">${fmtAUD(p.remaining)}</span></div></div></div>`}).join('')||'<div class="empty-state">No history yet.</div>';
  }else{
    const months=await getMonthlyStats(cfg,cats);const vc=cats.filter(c=>c.type==='variable');
    hc.innerHTML=months.map(m=>`<div class="week-card"><div class="wc-head"><div><div class="wc-label">${m.label}</div></div><span class="pill ${m.remaining>=0?'ok':'over'}">${m.remaining>=0?'Net +':'Net '}${fmtPos(m.remaining)}</span></div><div class="wc-body"><div class="wc-row"><span class="wc-key">Total in</span><span class="wc-val green">${fmtPos(m.totalIncome)}</span></div><div class="wc-row"><span class="wc-key">Gig income</span><span class="wc-val green">+${fmtPos(m.totalGigIncome)}</span></div><div class="wc-row"><span class="wc-key">Total out</span><span class="wc-val red">-${fmtPos(m.totalSpent)}</span></div>${m.gigRunCount>0?`<div class="wc-divider"></div><div class="wc-row"><span class="wc-key">Gig runs</span><span class="wc-val">${m.gigRunCount} · ${fmtDur(m.gigTotalMinutes)}</span></div>`:''}<div class="wc-divider"></div><div class="wc-sub-title">By category</div>${vc.map(c=>{const s=m.spentByCat[c.id]||0;const b=c.budget*m.periods.length;const pct=b>0?Math.min((s/b)*100,100):0;return`<div class="hist-cat-row"><div class="hist-cat-top"><span class="hist-cat-name"><i class="ti ${c.icon}"></i> ${c.name}</span><span class="hist-cat-val">${fmtPos(s)}</span></div><div class="progress-track sm"><div class="progress-fill ${pct>=100?'over':pct>75?'caution':'ok'}" style="width:${pct}%"></div></div></div>`}).join('')}</div></div>`).join('')||'<div class="empty-state">No history yet.</div>';
  }
}

async function renderSettings(el,p,state){
  const s=state.settings;
  el.innerHTML=`<div class="topbar"><button class="icon-btn" id="dt"><span class="hb"><span class="hbl"></span><span class="hbl"></span><span class="hbl"></span></span></button><div class="topbar-text"><div class="topbar-title">Settings</div></div></div>
<div class="scroll-body" style="padding-bottom:24px">
<div class="settings-section"><div class="settings-section-title">Income</div>
<div class="si"><div><div class="si-label">Pay cycle</div></div><div class="seg" id="cs"><button class="seg-opt${s.payCycle==='fortnightly'?' on':''}" data-v="fortnightly">Fortnight</button><button class="seg-opt${s.payCycle==='weekly'?' on':''}" data-v="weekly">Weekly</button></div></div>
<div class="si"><div><div class="si-label" id="il">${s.payCycle==='fortnightly'?'Fortnightly':'Weekly'} income</div></div><div class="si-right"><input class="si-input" id="ii" type="number" min="0" step="0.01" value="${s.income||''}" placeholder="0.00" inputmode="decimal"></div></div>
<div class="si"><div><div class="si-label">Pay day</div></div><div class="si-right"><select class="si-select" id="pd">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map((d,i)=>`<option value="${i}"${s.payDay===i?' selected':''}>${d}</option>`).join('')}</select></div></div></div>
<div class="settings-section"><div class="settings-section-title">Budgets</div>
<div class="si tappable" id="gc"><div><div class="si-label">Manage categories</div><div class="si-sub">${state.categories.length} configured</div></div><div class="si-right"><i class="ti ti-chevron-right"></i></div></div>
<div class="si"><div><div class="si-label">Roll over unspent budget</div><div class="si-sub">Carry unused variable budget forward</div></div><div class="switch${s.rollover?' on':''}" id="sw-rollover"></div></div></div>
<div class="settings-section"><div class="settings-section-title">Alerts</div>
<div class="si"><div><div class="si-label">Spending pace alerts</div><div class="si-sub">Warn when running over pace</div></div><div class="switch${s.alertPace?' on':''}" id="sw-alertPace"></div></div>
<div class="si"><div><div class="si-label">Over-budget alert</div><div class="si-sub">Notify when a category exceeds limit</div></div><div class="switch${s.alertOver?' on':''}" id="sw-alertOver"></div></div>
<div class="si"><div><div class="si-label">Period summary</div><div class="si-sub">Recap on the last day of pay period</div></div><div class="switch${s.alertSummary?' on':''}" id="sw-alertSummary"></div></div></div>
<div class="settings-section"><div class="settings-section-title">Data</div>
<div class="si tappable" id="eb"><div><div class="si-label">Export all data</div><div class="si-sub">Download as CSV</div></div><div class="si-right"><i class="ti ti-download"></i></div></div>
<div class="si tappable danger" id="cb"><div><div class="si-label">Clear all data</div></div><div class="si-right"><i class="ti ti-trash"></i></div></div></div>
<div class="settings-footer">float v1.0 · Offline PWA · Data stored on-device</div></div>`;
  document.getElementById('dt').addEventListener('click',toggleDrawer);
  document.getElementById('cs').querySelectorAll('.seg-opt').forEach(b=>b.addEventListener('click',async()=>{const v=b.dataset.v;await setSetting('payCycle',v);document.getElementById('il').textContent=(v==='fortnightly'?'Fortnightly':'Weekly')+' income';document.querySelectorAll('#cs .seg-opt').forEach(x=>x.classList.toggle('on',x.dataset.v===v));setState({...getState(),settings:{...getState().settings,payCycle:v}})}));
  document.getElementById('ii').addEventListener('change',async e=>{const v=parseFloat(e.target.value)||0;await setSetting('income',v);setState({...getState(),settings:{...getState().settings,income:v}})});
  document.getElementById('pd').addEventListener('change',async e=>setSetting('payDay',parseInt(e.target.value)));
  document.getElementById('gc').addEventListener('click',()=>navigate('categories'));
  ['rollover','alertPace','alertOver','alertSummary'].forEach(k=>{const sw=document.getElementById(`sw-${k}`);sw?.addEventListener('click',async()=>{const v=!sw.classList.contains('on');sw.classList.toggle('on',v);await setSetting(k,v);setState({...getState(),settings:{...getState().settings,[k]:v}})})});
  document.getElementById('eb').addEventListener('click',exportCSV);
  document.getElementById('cb').addEventListener('click',()=>{if(confirm('Clear ALL data? This cannot be undone.')){indexedDB.deleteDatabase('float');location.reload()}});
}

const CAT_ICONS=['ti-home','ti-wifi','ti-device-mobile','ti-shopping-cart','ti-coffee','ti-car','ti-device-gamepad','ti-shirt','ti-heart','ti-paw','ti-plane','ti-tool','ti-music','ti-book','ti-bike','ti-pill','ti-cash','ti-dots'];
async function renderCategories(el,p,state){
  const cats=await getCategories();const fx=cats.filter(c=>c.type==='fixed');const vr=cats.filter(c=>c.type==='variable');
  const row=c=>`<div class="cat-list-item" data-id="${c.id}"><div class="cat-list-icon"><i class="ti ${c.icon}"></i></div><div class="cat-list-info"><div class="cat-list-name">${c.name}</div><div class="cat-list-budget">${fmtPos(c.budget)} / period <span class="pill ${c.type==='fixed'?'fx':'vr'}">${c.type}</span></div></div><i class="ti ti-chevron-right" style="color:var(--text3)"></i></div>`;
  el.innerHTML=`<div class="topbar"><button class="icon-btn" id="bb"><i class="ti ti-chevron-left"></i></button><div class="topbar-text"><div class="topbar-title">Categories</div></div></div>
<div class="scroll-body" style="padding-bottom:24px"><div class="settings-help">Tap to edit. Fixed bills are deducted automatically each period.</div>
${fx.length?`<div class="settings-section"><div class="settings-section-title">Fixed bills</div>${fx.map(row).join('')}</div>`:''}
${vr.length?`<div class="settings-section"><div class="settings-section-title">Variable budgets</div>${vr.map(row).join('')}</div>`:''}
<button class="add-cat-btn" id="ac"><i class="ti ti-plus"></i> Add category</button></div>`;
  document.getElementById('bb').addEventListener('click',()=>navigate('settings'));
  const cm={};cats.forEach(c=>cm[c.id]=c);
  el.querySelectorAll('.cat-list-item').forEach(x=>x.addEventListener('click',()=>showCatModal(cm[x.dataset.id],el,p,state)));
  document.getElementById('ac').addEventListener('click',()=>showCatModal(null,el,p,state));
}

function showCatModal(cat,el,p,state){
  const isE=!!cat;
  document.getElementById('cat-modal-title').textContent=isE?'Edit category':'Add category';
  document.getElementById('cat-name').value=cat?.name||'';
  document.getElementById('cat-budget').value=cat?cat.budget.toFixed(2):'';
  document.querySelectorAll('#cat-modal .tt-btn').forEach(b=>{b.classList.toggle('on',b.dataset.type===(cat?.type||'variable'));b.onclick=()=>{document.querySelectorAll('#cat-modal .tt-btn').forEach(x=>x.classList.remove('on'));b.classList.add('on')}});
  const grid=document.getElementById('cat-icon-grid');const si=cat?.icon||'ti-tag';
  grid.innerHTML=CAT_ICONS.map(ic=>`<button class="icon-opt${ic===si?' sel':''}" data-icon="${ic}"><i class="ti ${ic}"></i></button>`).join('');
  grid.querySelectorAll('.icon-opt').forEach(b=>b.onclick=()=>{grid.querySelectorAll('.icon-opt').forEach(x=>x.classList.remove('sel'));b.classList.add('sel')});
  const db=document.getElementById('cat-delete');db.style.display=isE?'flex':'none';
  db.onclick=async()=>{if(!confirm(`Delete "${cat.name}"?`))return;await deleteCategory(cat.id);document.getElementById('cat-modal').classList.remove('visible');const nc=await getCategories();setState({...getState(),categories:nc});renderCategories(el,p,{...state,categories:nc})};
  document.getElementById('cat-save').onclick=async()=>{const nm=document.getElementById('cat-name').value.trim();const bg=parseFloat(document.getElementById('cat-budget').value)||0;const tp=document.querySelector('#cat-modal .tt-btn.on')?.dataset.type||'variable';const ic=document.querySelector('#cat-icon-grid .icon-opt.sel')?.dataset.icon||'ti-tag';if(!nm)return;const ex=await getCategories();await saveCategory({id:cat?.id||genId('cat'),name:nm,budget:bg,type:tp,icon:ic,order:cat?.order??ex.length,createdAt:cat?.createdAt||Date.now()});document.getElementById('cat-modal').classList.remove('visible');const nc=await getCategories();setState({...getState(),categories:nc});renderCategories(el,p,{...state,categories:nc})};
  document.getElementById('cat-cancel').onclick=document.getElementById('cat-modal-close').onclick=()=>document.getElementById('cat-modal').classList.remove('visible');
  document.getElementById('cat-modal').classList.add('visible');
}

async function exportCSV(){
  const keys=await getAllPK();const rows=[['Date','Period','Type','Category','Amount','Note','Hours','Minutes','Hourly Rate']];
  for(const k of keys){const txs=await getTxForPeriod(k);for(const t of txs)rows.push([t.date,k,t.type,t.categoryId||'',t.amount,t.note||'',t.hours||'',t.minutes||'',t.hourlyRate||''])}
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');const b=new Blob([csv],{type:'text/csv'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='float-export.csv';a.click();URL.revokeObjectURL(u);
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
async function boot(){
  await seedIfNeeded();
  const settings=await getAllSettings();const categories=await getCategories();
  setState({settings,categories,lastStats:null});
  initDrawer();initFAB();
  document.getElementById('sheet-backdrop').addEventListener('click',()=>{document.querySelectorAll('.bottom-sheet.visible').forEach(s=>s.classList.remove('visible'));document.body.classList.remove('sheet-open')});
  if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker
      .register('./sw.js')
      .then(() => console.log('SW registered'))
      .catch(err => console.error('SW failed', err));
  });
}
  navigate('dashboard');
}
boot().catch(console.error);
</script>
